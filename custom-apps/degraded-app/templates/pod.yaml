apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test
spec:
  restartPolicy: Always
  containers:
    - name: runner
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "fail flag = {{ .Values.test.fail }}";
          {{- if .Values.test.fail }}
          echo "failing...";
          exit 1
          {{- else }}
          echo "success...";
          sleep 3600
          {{- end }}