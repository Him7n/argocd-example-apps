apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gitops-overrides-test.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "gitops-overrides-test.name" . }}
spec:
  replicas: {{ int .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gitops-overrides-test.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gitops-overrides-test.name" . }}
    spec:
      containers:
        - name: printer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            {{- range $k, $v := .Values.testEnv }}
            - name: {{ $k | quote }}
              value: {{ $v | toString | quote }}
            {{- end }}
          command: ["/bin/sh","-c"]
          args:
            - >
              echo "=== GitOps Overrides / Expressions (reuse ENV + add SVC + add <+variables.*>) ===";
              echo "ReplicaCount(from spec): {{ .Values.replicaCount | toString }}";
              echo "Image: {{ .Values.image.repository | toString }}:{{ .Values.image.tag | toString }}";
              echo "--- Explicit variables (echo) ---";
              {{- range $k, $_ := .Values.testEnv }}
              echo {{ $k }}="${{ $k }}";
              {{- end }}
              echo "--- Full env (sorted) ---";
              env | sort;
              echo "=== Done. Sleeping... ===";
              sleep 3600;
