appNameOne: test-replicaset-with-mix-of-pods
appNameTwo: test-another-replicaset-with-mix-of-pods

replicaCount: 1

image:
  repository: nginx
  tag: "1.25-alpine"     # override in Harness UI to generate a new ReplicaSet
  pullPolicy: IfNotPresent

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

revisionHistoryLimit: 20

readinessPath: /
livenessPath: /
